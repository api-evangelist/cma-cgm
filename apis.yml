apis:
  - aid: cma-cgm:cma-cgm-track-and-trace-api
    name: CMA CGM Track and Trace API
    description: >-
      Public and private REST API exposing CMA CGM, ANL, APL, CNC, and
      Containerships shipment events aligned with the DCSA Track & Trace v2.2.0
      OpenAPI specification (`/operation/trackandtrace/v1`). Two operations:
      `GET /events` to search events by booking reference, transport document
      reference, equipment reference, or vessel, and `GET /events/{trackingReference}`
      to retrieve events for a single reference. The Public connection uses an
      API Key and returns equipment moves, transshipment events, and planned
      vessel arrival/departure dates. The Private connection uses OAuth2 client
      credentials (`tandtcommercial:read:be`, `tandtpublic:read:be` scopes) and
      requires verified booking-party identity to additionally expose actual
      rail and ramp moves, inland dates, and finer-grained event metadata.
    humanURL: https://api-portal.cma-cgm.com/products/api/operation.trackandtrace.v1
    baseURL: https://apis.cma-cgm.net/operation/trackandtrace/v1
    tags:
      - Track and Trace
      - DCSA
      - Container Tracking
      - Shipment Events
      - Maritime
    properties:
      - type: Documentation
        url: https://api-portal.cma-cgm.com/products/api/operation.trackandtrace.v1
      - type: Documentation
        url: https://dcsa.org/standards/track-trace
      - type: SignUp
        url: https://api-portal.cma-cgm.com/
  - aid: cma-cgm:cma-cgm-schedules-api
    name: CMA CGM Schedules API
    description: >-
      Vessel schedule and routing API exposing point-to-point sailing
      solutions, port schedules, and vessel itineraries for the upcoming
      12-week horizon across the CMA CGM, ANL, APL, CNC, and Containerships
      networks. Returns voyage reference, vessel name and IMO, port of
      loading, port of discharge, transhipments, and estimated times of
      arrival and departure. Equivalent EDIFACT IFTSAI feed is available on
      the EDI channel.
    humanURL: https://api-portal.cma-cgm.com/products/schedules
    tags:
      - Schedules
      - Vessel Schedule
      - Port Schedule
      - Sailing Schedule
      - Routing
    properties:
      - type: Documentation
        url: https://api-portal.cma-cgm.com/products/schedules
      - type: HumanURL
        url: https://www.cma-cgm.com/ebusiness/schedules
      - type: SignUp
        url: https://api-portal.cma-cgm.com/
  - aid: cma-cgm:cma-cgm-quotation-api
    name: CMA CGM Quotation API
    description: >-
      Spot quotation and US service contract API delivering ocean freight rates
      with all applicable surcharges (BAF, currency adjustment, security,
      origin/destination handling, peak season, etc.) directly into customer
      booking and ERP systems. Returns quotation reference, validity window,
      commodity, equipment type, and itemised charge breakdown so customers can
      bypass the manual quotation request flow on the CMA CGM customer portal.
    humanURL: https://api-portal.cma-cgm.com/
    tags:
      - Quotation
      - Pricing
      - Spot Rates
      - Service Contracts
      - Ocean Freight
    properties:
      - type: Documentation
        url: https://api-portal.cma-cgm.com/
      - type: SignUp
        url: https://api-portal.cma-cgm.com/
  - aid: cma-cgm:cma-cgm-booking-request-api
    name: CMA CGM Booking Request API
    description: >-
      Booking request API allowing shippers, NVOCCs, and freight forwarders to
      submit, amend, and cancel ocean bookings against CMA CGM Group services
      directly from their TMS or ERP. The REST profile mirrors the standard
      maritime EDIFACT IFTMBF booking message, accepts party details, cargo
      and equipment particulars, and routing, and returns a booking reference
      plus a downstream confirmation (IFTMBC equivalent).
    humanURL: https://api-portal.cma-cgm.com/products/api/shipping.bookingrequest.v1
    tags:
      - Booking
      - Booking Request
      - Shipping
      - EDIFACT
      - Maritime
    properties:
      - type: Documentation
        url: https://api-portal.cma-cgm.com/products/api/shipping.bookingrequest.v1
      - type: SignUp
        url: https://api-portal.cma-cgm.com/
  - aid: cma-cgm:cma-cgm-invoice-api
    name: CMA CGM Invoice API
    description: >-
      Invoice API family exposing freight invoices and associated documents
      programmatically — including a "Copy Invoice PDF" operation that
      retrieves the original PDF artifact for a given invoice number. Lets
      finance teams reconcile shipping invoices in their AP systems without
      logging in to MyCMA CGM. Parallels the EDIFACT INVOIC EDI feed.
    humanURL: https://api-portal.cma-cgm.com/
    tags:
      - Invoice
      - Finance
      - Billing
      - Document Retrieval
      - EDIFACT
    properties:
      - type: Documentation
        url: https://api-portal.cma-cgm.com/
      - type: HumanURL
        url: https://www.cma-cgm.com/products-services/ecommerce/finance
      - type: SignUp
        url: https://api-portal.cma-cgm.com/
  - aid: cma-cgm:ceva-logistics-tracking-api
    name: CEVA Logistics Tracking API
    description: >-
      CEVA Logistics — the CMA CGM Group contract logistics, freight
      forwarding, and ground transportation subsidiary — exposes a separate
      shipment tracking REST API through developer.cevalogistics.com. The API
      returns the location and status of CEVA bills of lading, house bills of
      lading, and pro numbers across CEVA's road, ocean, air, and contract
      logistics flows.
    humanURL: https://developer.cevalogistics.com/
    tags:
      - Tracking
      - Logistics
      - Freight Forwarding
      - Contract Logistics
      - CEVA
    properties:
      - type: Documentation
        url: https://developer.cevalogistics.com/
