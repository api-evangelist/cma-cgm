aid: cma-cgm
name: CMA CGM
description: >-
  CMA CGM is a Marseille-headquartered French container shipping, logistics,
  and port operator and the third-largest ocean carrier in the world. Founded
  in 1978 by Jacques Saadé and led today by Chairman & CEO Rodolphe Saadé, the
  CMA CGM Group operates a fleet of 593 vessels with 4.5 million TEU of
  capacity calling 420 ports across 160 countries on 257 maritime services. The
  group includes maritime brands ANL, APL, CNC Line, Containerships, Comanav,
  and Mercosul Line; terminal operator CMA Terminals and Terminal Link; the
  CEVA Logistics contract logistics and freight forwarding business
  (acquired 2019); CMA CGM Air Cargo; Brittany Ferries and La Méridionale
  passenger ferries; and the CMA Média portfolio (La Provence, La Tribune,
  BFM-RMC, Brut). Through api-portal.cma-cgm.com the group exposes a DCSA-aligned
  REST API surface — Track and Trace v1 (DCSA v2.2.0), Schedules, Booking
  Request, Quotation, and Invoice — plus a parallel EDI catalog (EDIFACT
  IFTSAI, IFTMBF, IFTSTA, INVOIC) and group-level digital initiatives
  including ZEBOX (startup accelerator), Traxens-based IoT smart containers,
  and a strategic AI partnership with Mistral.
